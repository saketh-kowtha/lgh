name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Dead code check (Knip)
        run: npx knip

      - name: Run tests
        run: npm test

      - name: Update Architecture (AI)
        if: github.event_name == 'pull_request'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
        run: node .github/scripts/auto-docs.mjs

      - name: Commit AI changes back to PR
        if: github.event_name == 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update ARCHITECTURE.md (AI)"
          file_pattern: "ARCHITECTURE.md"

      - name: Build
        run: npm run build

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high + critical)
        run: npm audit --audit-level=high

      - name: Check for known-vulnerable packages
        run: |
          # Fail if any dependency has a critical severity
          npm audit --json | node -e "
            const chunks = [];
            process.stdin.on('data', c => chunks.push(c));
            process.stdin.on('end', () => {
              const report = JSON.parse(chunks.join(''));
              const vulns = report.metadata?.vulnerabilities || {};
              const critical = vulns.critical || 0;
              const high = vulns.high || 0;
              if (critical > 0) {
                console.error('FAIL: ' + critical + ' critical vulnerabilities found');
                process.exit(1);
              }
              if (high > 0) {
                console.warn('WARN: ' + high + ' high-severity vulnerabilities found');
              }
              console.log('Audit passed — critical: ' + critical + ', high: ' + high);
            });
          " || true
