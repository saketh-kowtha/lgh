name: Claude Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    # Only run if 'ai-review' label is present and PR is not a draft
    if: |
      contains(github.event.pull_request.labels.*.name, 'ai-review') &&
      github.event.pull_request.draft == false &&
      (github.event.pull_request.author_association == 'OWNER' ||
       github.event.pull_request.author_association == 'MEMBER' ||
       github.event.pull_request.author_association == 'COLLABORATOR')
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Check for API key
        id: check
        run: |
          if [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "has_key=true"  >> "$GITHUB_OUTPUT"
            echo "✓ ANTHROPIC_API_KEY present — Claude review will run"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  ANTHROPIC_API_KEY not set — skipping Claude review"
            echo "   Add it at: Settings → Secrets → Actions → New secret"
          fi

      - name: Setup Node.js
        if: steps.check.outputs.has_key == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run Claude code review
        if: steps.check.outputs.has_key == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          REPO:              ${{ github.repository }}
        run: node .github/scripts/claude-review.mjs
