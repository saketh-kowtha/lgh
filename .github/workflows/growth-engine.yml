name: Growth Engine

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'README.md'
      - 'docs/**'

jobs:
  growth:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Power the Growth Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPO: ${{ github.repository }}
        run: node .github/scripts/growth-engine.mjs

      - name: Open docs PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes — skipping"
            exit 0
          fi
          BRANCH="chore/growth-engine-docs"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add README.md docs/
          git commit -m "marketing: auto-update README and docs"
          git push origin "$BRANCH" --force
          gh pr create \
            --title "marketing: auto-update README and docs" \
            --body "Automated documentation update from Growth Engine. Safe to merge or close." \
            --base main \
            --head "$BRANCH" 2>/dev/null || echo "PR already open — branch updated"
