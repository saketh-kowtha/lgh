name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret not set — skipping npm publish"
            exit 0
          fi
          npm publish --access public

      - name: Compute tarball SHA256 (for Homebrew)
        id: sha
        run: |
          # Extract version from tag (e.g. refs/tags/v1.2.3 -> 1.2.3)
          VERSION=${GITHUB_REF#refs/tags/v}
          URL="https://registry.npmjs.org/lazyhub/-/lazyhub-${VERSION}.tgz"
          
          echo "Waiting for tarball ${VERSION} to become available on npm CDN..."
          for i in $(seq 1 18); do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$URL")
            [ "$STATUS" = "200" ] && break
            echo "  attempt $i/18: HTTP $STATUS — retrying in 10s"
            sleep 10
          done
          
          SHA=$(curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors "$URL" | sha256sum | awk '{print $1}')
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Push formula to homebrew-tap
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.sha.outputs.version }}
          SHA256:  ${{ steps.sha.outputs.sha }}
          URL:     ${{ steps.sha.outputs.url }}
        with:
          github-token: ${{ secrets.TAP_TOKEN }}
          script: |
            const { VERSION, SHA256, URL } = process.env
            const formula = `class Lazyhub < Formula
              desc "Lazygit-style GitHub TUI — keyboard-driven terminal UI for GitHub"
              homepage "https://github.com/saketh-kowtha/lazyhub"
              url "${URL}"
              sha256 "${SHA256}"
              version "${VERSION}"
              license "MIT"
              depends_on "node"
              def install
                system "npm", "install", *Language::Node.std_npm_install_args(libexec)
                bin.install_symlink Dir["#{libexec}/bin/*"]
              end
              test do
                assert_match "lazyhub", shell_output("#{bin}/lazyhub --version 2>&1", 1)
              end
            end`
            const owner = 'saketh-kowtha', repo = 'homebrew-tap', path = 'Formula/lazyhub.rb'
            let sha
            try {
              const { data } = await github.rest.repos.getContent({ owner, repo, path })
              sha = data.sha
            } catch (err) { if (err.status !== 404) throw err }
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `lazyhub ${VERSION}`,
              content: Buffer.from(formula).toString('base64'),
              sha,
            })
