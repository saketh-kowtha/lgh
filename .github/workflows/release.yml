name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Prepare release
        id: prepare
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          REPO: ${{ github.repository }}
        run: node .github/scripts/prepare-release.mjs

      - name: Commit version bump + changelog
        if: steps.prepare.outputs.version != ''
        env:
          VERSION: ${{ steps.prepare.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md README.md docs/
          git diff --cached --quiet || git commit -m "chore(release): v${VERSION} [skip ci]"
          git push

      - name: Create GitHub Release
        if: steps.prepare.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.prepare.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            --latest

      - name: Publish to npm
        if: steps.prepare.outputs.version != ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret not set — skipping npm publish"
            exit 0
          fi
          npm publish --access public

      - name: Compute tarball SHA256 (for Homebrew)
        if: steps.prepare.outputs.version != ''
        id: sha
        env:
          VERSION: ${{ steps.prepare.outputs.version }}
        run: |
          URL="https://registry.npmjs.org/lazyhub/-/lazyhub-${VERSION}.tgz"
          # Poll until the tarball is available on the npm CDN (propagation can take 30-120s).
          # --retry alone only retries on network-level failures; --retry-all-errors is
          # required to also retry HTTP 4xx/5xx, preventing a 404 during propagation from
          # hashing empty content and committing e3b0c44... to the tap.
          echo "Waiting for tarball to become available on npm CDN..."
          for i in $(seq 1 18); do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$URL")
            [ "$STATUS" = "200" ] && break
            echo "  attempt $i/18: HTTP $STATUS — retrying in 10s"
            sleep 10
          done
          SHA=$(curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors "$URL" | sha256sum | awk '{print $1}')
          [ -z "$SHA" ] && echo "ERROR: SHA256 is empty — tarball fetch failed for $URL" && exit 1
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Push formula to homebrew-tap
        if: steps.prepare.outputs.version != ''
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.prepare.outputs.version }}
          SHA256:  ${{ steps.sha.outputs.sha }}
          URL:     ${{ steps.sha.outputs.url }}
        with:
          github-token: ${{ secrets.TAP_TOKEN }}
          script: |
            const version = process.env.VERSION
            const sha256  = process.env.SHA256
            const url     = process.env.URL

            const formula = `class Lazyhub < Formula
              desc "Lazygit-style GitHub TUI — keyboard-driven terminal UI for GitHub"
              homepage "https://github.com/saketh-kowtha/lazyhub"
              url "${url}"
              sha256 "${sha256}"
              version "${version}"
              license "MIT"

              depends_on "node"

              def install
                system "npm", "install", *Language::Node.std_npm_install_args(libexec)
                bin.install_symlink Dir["#{libexec}/bin/*"]
              end

              test do
                assert_match "lazyhub", shell_output("#{bin}/lazyhub --version 2>&1", 1)
              end
            end
            `

            const owner = 'saketh-kowtha'
            const repo  = 'homebrew-tap'
            const path  = 'Formula/lazyhub.rb'

            let sha
            try {
              const { data } = await github.rest.repos.getContent({ owner, repo, path })
              sha = data.sha
            } catch (err) {
              // 404 = file doesn't exist yet (first release) — that's fine, sha stays undefined.
              // Any other status (403 permission error, 500 server error, etc.) is a real failure.
              if (err.status !== 404) throw err
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `lazyhub ${version}`,
              content: Buffer.from(formula).toString('base64'),
              sha,
            })
