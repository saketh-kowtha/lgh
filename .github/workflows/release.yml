name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Prepare Version & Changelog
        id: prepare
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUMP_TYPE: ${{ inputs.bump_type }}
          PR_LABELS: '[]'
          REPO: ${{ github.repository }}
        run: node .github/scripts/prepare-release.mjs

      - name: Open release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.prepare.outputs.version }}
          BUMP: ${{ inputs.bump_type }}
        run: |
          BRANCH="release/v${VERSION}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add package.json CHANGELOG.md README.md docs/
          git diff --cached --quiet && echo "Nothing to commit" || \
            git commit -m "chore: release v${VERSION}"
          git push origin "$BRANCH" --force
          BODY=$(printf "## Release v%s (%s bump)\n\nReview CHANGELOG.md for what's included. Merge this PR to create the GitHub Release, publish to npm, and update Homebrew." "$VERSION" "$BUMP")
          gh pr create \
            --title "chore: release v${VERSION}" \
            --body "$BODY" \
            --base main \
            --head "$BRANCH"
